version: "3.8"

services:
  # Next.js Frontend + BFF
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    depends_on:
      - ai-pipeline
    volumes:
      - ./src:/app/src
      - ./public:/app/public

  # Python AI Pipeline Service
  ai-pipeline:
    build:
      context: ./services/ai-pipeline
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./services/ai-pipeline/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis (session cache, rate limiting)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
